apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infrastructure-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/boulamared/skills-matrix-gitops'
    targetRevision: HEAD
    path: infrastructure-umbrella
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: infrastructure
syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:             
      - CreateNamespace=true  